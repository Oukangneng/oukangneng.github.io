<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scrollytelling with OSM and Scrollama</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script src="https://unpkg.com/scrollama/dist/scrollama.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="map"></div>
    <div id="scrolling-content">
        <div class="step">
            <h2>Section 1: Introduction</h2>
            <p>Introduction to the scrollytelling story.</p>
        </div>
        <div class="step">
            <h2>Section 2: Political Prisoner #1</h2>
            <p>Details about this prisoner.</p>
        </div>
        <div class="step">
            <h2>Section 3: Trends Over Time</h2>
            <p>Trends in political imprisonment over time.</p>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
